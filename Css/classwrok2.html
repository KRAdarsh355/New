<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layered Box Model</title>
</head>
    <style>
        .inner{
            width: 80px;
            height:40px;
            border:3px solid red;
            margin:20px auto;
            padding:20px 20px;
        }
        .outer{
            width:400px;
            height:200px;
            margin:50px auto;
            padding:20px 20px;
            border:3px green dotted; 
        }
        .layer{
            width:320px;
            height:120px;
            padding:20px 20px;
            border:3px dashed yellow;
            margin:20px auto;
        }
    </style>
<body>
    <div class="outer">
        <div class="layer">
            <div class="inner">
                <p>PIXEL</p>
            </div>
        </div>
    </div>
</body>
</html>
