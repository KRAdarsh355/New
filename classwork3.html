<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>NEWSLETTER SIGNUP</h1>
    <form>
        <label for="Fullname">Fullname:</label>
        <input type="text" id="Fullname" name="fullname" required placeholder="Enter your fullname"><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="Email" required placeholder="Enter your email address"><br>
        <label for="password">Create password:</label>
        <input type="password" id="password" name="Password" required placeholder="Enter your password"><br>
        <label for="confirm-password">Confirm password:</label>
        <input type="password" id="confirm-password" name="Confirm Password" required placeholder="Re-enter your password"><br>
        <br>
        <label for="terms">I agree to the terms and conditions:</label>
        <input type="checkbox" id="terms" name="Terms" required><br>
        <button type="submit" onclick="alert('You have signed up!')">Submit</button><br>
        <hr>
        <p> &copy; 2026.</p>
    </form>
</body>
</html>
